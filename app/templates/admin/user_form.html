{% extends "admin/base_admin.html" %}

{% block title %}{{ 'Редактирование' if user else 'Новый пользователь' }}{% endblock %}

{% block content %}
<div class="card mt-4">
    <div class="card-body">
        <h4 class="mb-3">
            {{ 'Редактирование' if user else 'Новый пользователь' }}
        </h4>

        <form method="post">
            <div class="mb-3">
                <label for="login" class="form-label">Логин</label>
                <input type="text" name="login" id="login" class="form-control" 
                    value="{{ form_data.login if form_data else (user.login if user else '') }}" 
                    required>
            </div>

            <div class="mb-3">
                <label for="full_name" class="form-label">Полное имя</label>
                <input type="text" name="full_name" id="full_name" class="form-control" 
                    value="{{ form_data.full_name if form_data else (user.full_name if user else '') }}" 
                    required>
            </div>

            <div class="mb-3">
                <label for="password" class="form-label">Пароль</label>
                <input type="password" name="password" id="password" class="form-control" 
                       {% if not user %}required{% endif %}>
                {% if user %}<div class="form-text">Оставьте пустым, если не хотите менять.</div>{% endif %}
            </div>

            <div class="mb-3">
                <label for="password_confirm" class="form-label">Повторите пароль</label>
                <input type="password" name="password_confirm" id="password_confirm" class="form-control" 
                       {% if not user %}required{% endif %}>
            </div>

            <div class="form-check mb-3">
                <input class="form-check-input" type="checkbox" name="admin_right" id="admin_right"
                       {% if form_data and form_data.get('admin_right') or (user and user.is_admin) %}checked{% endif %}>
                <label class="form-check-label" for="admin_right">
                    Назначить администратором
                </label>
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-success">Сохранить</button>
                <a href="{{ url_for('admin.users') }}" class="btn btn-secondary">Назад</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
