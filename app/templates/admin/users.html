{% extends "admin/base_admin.html" %}

{% block title %}Пользователи{% endblock %}

{% block content %}

<div class="d-flex justify-content-between align-items-center mt-4 mb-3">
    <h4>Пользователи</h4>
    <a href="{{ url_for('admin.create_user') }}" class="btn btn-primary btn-sm">
        + Добавить
    </a>
</div>

<form method="get" class="row g-2 mb-3">

    <div class="col-md-4">
        <input type="text" name="search" class="form-control"
               placeholder="Поиск..."
               value="{{ search }}">
    </div>

    <div class="col-md-3 form-check mt-2">
        <input class="form-check-input" type="checkbox" name="active_only"
               {% if active_only %}checked{% endif %}>
        <label class="form-check-label">Только активные</label>
    </div>

    <div class="col-md-2">
        <button type="submit" class="btn btn-secondary btn-sm">
            Найти
        </button>
    </div>

</form>

<table class="table table-sm table-bordered">

    <thead>
        <tr>
            <th>Логин</th>
            <th>ФИО</th>
            <th style="width:120px;">Статус</th>
            <th style="width:220px;">Переключатель прав</th>
            <th style="width:120px;">Действия</th>
        </tr>
    </thead>

    <tbody>
    {% for u in users %}
        <tr {% if not u.is_active %}class="table-secondary"{% endif %}>
            <td>{{ u.login }}</td>
            <td>{{ u.full_name }}</td>
            <td>
                <form method="post"
                     action="{{ url_for('admin.toggle_users', user_id=u.user_id) }}?{{ request.query_string|safe }}">
                    <button class="btn btn-sm {% if u.is_active %}btn-success{% else %}btn-outline-secondary{% endif %}"
                         onclick="return confirm('Вы уверены?')">
                        {% if u.is_active %}Активна{% else %}Отключена{% endif %}
                    </button>
                </form>
            </td>

            <td>
                <form method="post"
                     action="{{ url_for('admin.toggle_admin_users', user_id=u.user_id) }}?{{ request.query_string|safe }}">
                    <button class="btn btn-sm {% if u.is_admin %}btn-success{% else %}btn-outline-secondary{% endif %}">
                        {% if u.is_admin %}Администратор{% else %}Пользователь{% endif %}
                    </button>
                </form>
            </td>

            <td>
                <a href="{{ url_for('admin.edit_user', user_id=u.user_id) }}"
                   class="btn btn-sm btn-warning">
                    ✏️
                </a>
                <a href="{{ url_for('admin.user_points', user_id=u.user_id) }}"
                    class="btn btn-sm btn-info">
                    📍
                </a>
            </td>
        </tr>
    {% endfor %}
    </tbody>

</table>



{% endblock %}
