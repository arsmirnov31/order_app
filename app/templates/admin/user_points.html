{% extends "admin/base_admin.html" %}

{% block title %}Назначение точек{% endblock %}

{% block content %}

<div class="card mt-4">
    <div class="card-body">

        <h4 class="mb-3">
            Точки пользователя: {{ user.full_name or user.login }}
        </h4>

        <form method="post">

            <div class="row">
                {% for p in points %}
                    <div class="col-md-4 col-6">
                        <div class="form-check mb-2">
                            <input class="form-check-input"
                                   type="checkbox"
                                   name="points"
                                   value="{{ p.point_id }}"
                                   id="point_{{ p.point_id }}"
                                   {% if p.point_id in user_points %}checked{% endif %}>

                            <label class="form-check-label" for="point_{{ p.point_id }}">
                                {{ p.name }}
                            </label>
                        </div>
                    </div>
                {% endfor %}
            </div>

            <div class="mt-3 d-flex gap-2">
                <button type="submit" class="btn btn-success">
                    Сохранить
                </button>

                <a href="{{ url_for('admin.users') }}" class="btn btn-secondary">
                    Назад
                </a>
            </div>

        </form>

    </div>
</div>

{% endblock %}
